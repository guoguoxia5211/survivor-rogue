<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勇者幸存者 v3.0.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #gameContainer { position: relative; width: 100%; max-width: 400px; height: 100%; max-height: 700px; background: #1a1a2e; }
        #gameCanvas { width: 100%; height: 100%; }
        
        #topBar { position: absolute; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.7)); display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 8px; z-index: 100; }
        .stat { background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; color: #fff; }
        .stat-value { font-weight: bold; font-size: 14px; margin-top: 2px; }
        
        #expBar { position: absolute; top: 75px; left: 10px; right: 10px; height: 16px; background: rgba(0,0,0,0.6); border-radius: 8px; overflow: hidden; z-index: 100; }
        #expFill { height: 100%; background: linear-gradient(90deg, #2196F3, #64B5F6); width: 0%; transition: width 0.3s; }
        #expText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 11px; font-weight: bold; }
        
        #levelUp { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 500; padding: 20px; overflow-y: auto; }
        #levelUp h2 { color: #FFD700; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .skill-cards { display: flex; flex-direction: column; gap: 12px; }
        .skill-card { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 15px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .skill-card:hover { transform: scale(1.02); border-color: #FFD700; }
        .skill-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .skill-desc { font-size: 12px; opacity: 0.9; }
        .skill-rare { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
        .skill-epic { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 600; }
        #gameOverScreen { display: none; }
        h1 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(45deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .big-btn { background: linear-gradient(180deg, #4CAF50, #45a049); color: #fff; border: none; padding: 18px 50px; font-size: 20px; border-radius: 30px; cursor: pointer; margin: 10px; box-shadow: 0 4px 20px rgba(76,175,80,0.4); }
        .big-btn:active { transform: scale(0.95); }
        
        #joystick { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 200; touch-action: none; }
        #joystickKnob { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #fff; padding: 20px 30px; border-radius: 15px; font-size: 18px; z-index: 400; display: none; text-align: center; }
        
        .damage-number { position: absolute; font-size: 20px; font-weight: bold; color: #FF5252; text-shadow: 2px 2px 4px #000; pointer-events: none; animation: floatUp 1s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.3); } }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="topBar">
            <div class="stat"><div>❤️ 生命</div><div class="stat-value" id="hp">100</div></div>
            <div class="stat"><div>⭐ 等级</div><div class="stat-value" id="level">1</div></div>
            <div class="stat"><div>👾 敌人</div><div class="stat-value" id="enemies">0</div></div>
            <div class="stat"><div>💀 击杀</div><div class="stat-value" id="kills">0</div></div>
        </div>
        
        <div id="expBar">
            <div id="expFill"></div>
            <div id="expText">0/20</div>
        </div>
        
        <div id="joystick">
            <div id="joystickKnob"></div>
        </div>
        
        <div id="startScreen">
            <h1>🗡️ 勇者幸存者</h1>
            <p class="subtitle">Survivor Roguelike v3.0.0</p>
            <button class="big-btn" onclick="game.start()">开始游戏</button>
            <p style="color: #666; margin-top: 20px; font-size: 13px;">左摇杆移动 · 自动攻击</p>
        </div>
        
        <div id="gameOverScreen">
            <h1>💀 游戏结束</h1>
            <p id="finalStats" style="color: #888; margin: 20px; text-align: center;"></p>
            <button class="big-btn" onclick="game.start()">再来一局</button>
        </div>
        
        <div id="levelUp">
            <h2>✨ 升级！选择技能</h2>
            <div class="skill-cards" id="skillCards"></div>
        </div>
        
        <div id="message"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
